<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoshi Idle RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Header -->
        <header>
            <h1>Satoshi Idle RPG</h1>
            <div id="btc-wallet">Bank: <span id="sats-balance">0</span> Sats</div>
        </header>

        <div id="main-content">
            <!-- Left Panel: Combat -->
            <div id="combat-panel" class="panel">
                <h2>Stage <span id="stage-display">1</span> - Wave <span id="wave-display">1</span>/3</h2>
                
                <div id="battle-arena">
                    <div id="player-sprite" class="sprite">
                        <h3>Player</h3>
                        <p>HP: <span id="player-hp">100</span>/<span id="player-max-hp">100</span></p>
                        <p>ATK: <span id="player-atk">10</span></p>
                    </div>
                    <div id="vs">VS</div>
                    <div id="enemy-sprite" class="sprite">
                        <h3 id="enemy-name">Slime</h3>
                        <p>HP: <span id="enemy-hp">30</span>/<span id="enemy-max-hp">30</span></p>
                    </div>
                </div>

                <div id="combat-log">Game Started. Entering Stage 1!</div>
            </div>

            <!-- Right Panel: Inventory & Crafting -->
            <div id="menu-panel" class="panel">
                <h2>Inventory</h2>
                <ul id="inventory-list">
                    <li>Scrap Iron: <span id="inv-iron">0</span></li>
                    <li>Monster Core: <span id="inv-core">0</span></li>
                </ul>

                <h2>Crafting</h2>
                <div class="craft-box">
                    <p><strong>Iron Sword (+10 ATK)</strong></p>
                    <p>Cost: 5 Scrap Iron</p>
                    <button onclick="craftItem('sword')">Craft Sword</button>
                </div>
                <div class="craft-box">
                    <p><strong>Health Potion (Heal 50 HP)</strong></p>
                    <p>Cost: 2 Monster Cores</p>
                    <button onclick="craftItem('potion')">Craft Potion</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
