<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport settings for mobile game scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile MMO Prototype</title>
    
    <!-- PWA Manifest & Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50"> <!-- Sets the browser address bar color -->
    <link rel="apple-touch-icon" href="assets/idle/idle00.png"> <!-- Fallback icon for iOS -->

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-ui-container">
        <!-- Core Game Canvas (Assets drawn here are handled in engine.js/entities.js) -->
        <canvas id="gameCanvas"></canvas>

        <!-- Top Left: Player Status -->
        <div id="player-hud">
            <div class="portrait"><img src="assets/idle/idle00.png" alt="P" onerror="this.style.display='none'"></div>
            <div class="status-bars">
                <div class="level-badge" id="player-level">1</div>
                <div class="bars-container">
                    <div class="bar hp-bar"><div id="hp-fill" class="fill"></div><span id="hp-text">1000/1000</span></div>
                    <div class="bar mp-bar"><div id="mp-fill" class="fill"></div></div>
                </div>
            </div>
            <div class="buffs">
                <img src="assets/buff_attack.png" class="buff-icon" onerror="this.style.display='none'">
                <img src="assets/buff_speed.png" class="buff-icon" onerror="this.style.display='none'">
            </div>
        </div>

        <!-- Top Right: Minimap & Quests -->
        <div id="right-hud">
            <div id="minimap-container">
                <canvas id="minimapCanvas"></canvas>
            </div>
            <!-- Clickable Quest Tracker for Auto-Pathing -->
            <div id="quest-tracker" style="display: none;">
                <div id="quest-content">
                    <h4 class="quest-title"></h4>
                    <p class="quest-obj"></p>
                </div>
                <div id="auto-quest-indicator" class="hidden">Auto-Pathing...</div>
            </div>
        </div>

        <!-- Right Side: Menu Toggles -->
        <div id="menu-toggles">
            <button class="menu-btn" onclick="UI.toggleModal('inventory-modal')">Equip</button>
            <button class="menu-btn" onclick="UI.toggleModal('stats-modal')">Stats</button>
            <button class="menu-btn" onclick="UI.toggleModal('skills-modal')">Skills</button>
        </div>

        <!-- Bottom Left: Virtual Joystick -->
        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>

        <!-- Bottom Right: Action Bar -->
        <div id="action-bar">
            <div class="action-slot potion"><img src="assets/potion_hp.png" onerror="this.style.display='none'"><span id="hp-potion-count">95</span></div>
            <div class="action-slot potion"><img src="assets/potion_mp.png" onerror="this.style.display='none'"><span id="mp-potion-count">40</span></div>
            <div class="spacer"></div>
            <div class="action-slot skill" id="btn-attack"><img src="assets/skill_attack.png" onerror="this.style.display='none'"></div>
            <div class="action-slot toggle-btn" id="btn-auto">AUTO<br><span id="auto-status">OFF</span></div>
            
        </div>
        
        <div class="action-slot skill locked" id="btn-skill-1" onclick="Game.castFireArrow()">
            <span style="font-size: 8px; top: 2px; left: 10px;">FIRE ARROW</span>
        </div>

        <!-- Loot Notification Log -->
        <div id="loot-notification-container"></div>

        <!-- Bottom XP Bar -->
        <div id="exp-bar-container">
            <div id="exp-fill"></div>
            <div id="exp-text">EXP 0.000%</div>
        </div>

        <!-- Floating Modals -->
        <div id="inventory-modal" class="ui-modal hidden">
            <div class="modal-header">
                <h3>Inventory & Equipment</h3>
                <button class="close-btn" onclick="UI.toggleModal('inventory-modal')">X</button>
            </div>
            <div class="modal-body flex-row">
                <div class="char-preview-container">
                    <!-- Specific Equipment Slots -->
                    <div class="equipment-grid">
                        <div class="eq-slot" data-slot="head" title="Head"></div>
                        <div class="eq-slot" data-slot="cape" title="Cape"></div>
                        <div class="eq-slot" data-slot="amulet" title="Amulet"></div>
                        <div class="eq-slot" data-slot="armor" title="Armor"></div>
                        <div class="eq-slot" data-slot="hands" title="Hands"></div>
                        <div class="eq-slot" data-slot="ring1" title="Ring"></div>
                        <div class="eq-slot" data-slot="ring2" title="Ring"></div>
                        <div class="eq-slot" data-slot="legs" title="Legs"></div>
                    </div>
                    <div class="char-preview">
                        <img src="assets/idle/idle00.png" alt="Preview">
                        <div class="cp-stats">CP: <span id="combat-power">14,320</span></div>
                    </div>
                </div>
                <div class="inv-tabs-container">
                    <div class="tab-header">
                        <button class="tab active" onclick="UI.setInventoryTab('equip')">Equip</button>
                        <button class="tab" onclick="UI.setInventoryTab('consumables')">Consumables</button>
                    </div>
                    <div class="inventory-grid" id="inv-grid">
                        <!-- Items will be injected here by UI script -->
                    </div>
                    <div class="inventory-footer">
                        <div class="gold-display">💰 <span id="inv-gold">0</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Skills Modal (New) -->
        <div id="skills-modal" class="ui-modal hidden">
            <div class="modal-header">
                <h3>Class Skills</h3>
                <button class="close-btn" onclick="UI.toggleModal('skills-modal')">X</button>
            </div>
            <div class="modal-body">
                <div class="skills-list" id="skills-list">
                    <p>Unlock skills by leveling up...</p>
                </div>
            </div>
        </div>

        <div id="stats-modal" class="ui-modal hidden">
            <div class="modal-header">
                <h3>Ongoing Effects & Stats</h3>
                <button class="close-btn" onclick="UI.toggleModal('stats-modal')">X</button>
            </div>
            <div class="modal-body" id="stats-list"></div>
        </div>

        <!-- NEW: Item Tooltip for Long Press -->
        <div id="item-tooltip" class="hidden">
            <h4 id="tt-name">Item Name</h4>
            <div id="tt-rarity">Rarity</div>
            <div id="tt-stats">Stats</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="ui.js"></script>
    <script src="entities.js"></script>
    <script src="engine.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
