<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile MMO Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-ui-container">
        <!-- Core Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- Top Left: Player Status -->
        <div id="player-hud">
            <div class="portrait"><img src="assets/player_portrait.png" alt="P"></div>
            <div class="status-bars">
                <div class="level-badge">40</div>
                <div class="bars-container">
                    <div class="bar hp-bar"><div id="hp-fill" class="fill"></div><span id="hp-text">1000/1000</span></div>
                    <div class="bar mp-bar"><div id="mp-fill" class="fill"></div></div>
                </div>
            </div>
            <div class="buffs">
                <img src="assets/buff_attack.png" class="buff-icon">
                <img src="assets/buff_speed.png" class="buff-icon">
            </div>
        </div>

        <!-- Top Right: Minimap & Quests -->
        <div id="right-hud">
            <div id="minimap-container">
                <canvas id="minimapCanvas"></canvas>
            </div>
            <div id="quest-tracker">
                <h4 class="quest-title">[Battle] Level Achievement</h4>
                <p class="quest-obj">Kill Sleepless Ghost (<span id="quest-count">0</span>/40)</p>
            </div>
        </div>

        <!-- Right Side: Menu Toggles -->
        <div id="menu-toggles">
            <button class="menu-btn" onclick="UI.toggleModal('inventory-modal')">Equip</button>
            <button class="menu-btn" onclick="UI.toggleModal('stats-modal')">Stats</button>
            <button class="menu-btn">Skills</button>
        </div>

        <!-- Bottom: Action Bar -->
        <div id="action-bar">
            <div class="action-slot potion"><img src="assets/potion_hp.png"><span>95</span></div>
            <div class="action-slot potion"><img src="assets/potion_mp.png"><span>40</span></div>
            <div class="spacer"></div>
            <div class="action-slot skill" id="btn-attack"><img src="assets/skill_attack.png"></div>
            <div class="action-slot skill"><img src="assets/skill_magic.png"></div>
            <div class="action-slot toggle-btn" id="btn-auto">AUTO<br><span id="auto-status">OFF</span></div>
        </div>

        <!-- Floating Modals -->
        <div id="inventory-modal" class="ui-modal hidden">
            <div class="modal-header">
                <h3>Equipment</h3>
                <button class="close-btn" onclick="UI.toggleModal('inventory-modal')">X</button>
            </div>
            <div class="modal-body flex-row">
                <div class="char-preview">
                    <img src="assets/player_preview.png" alt="Preview">
                    <div class="cp-stats">CP: <span id="combat-power">14,320</span></div>
                </div>
                <div class="inv-tabs">
                    <button class="tab active">Equip</button>
                    <button class="tab">Consumables</button>
                    <button class="tab">Misc</button>
                    <div class="inventory-grid" id="inv-grid"></div>
                </div>
            </div>
        </div>

        <div id="stats-modal" class="ui-modal hidden">
            <div class="modal-header">
                <h3>Ongoing Effects & Stats</h3>
                <button class="close-btn" onclick="UI.toggleModal('stats-modal')">X</button>
            </div>
            <div class="modal-body" id="stats-list">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="ui.js"></script>
    <script src="entities.js"></script>
    <script src="engine.js"></script>
</body>
</html>
