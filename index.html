<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IdleRPG Engine Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; }
        #sidebar { width: 300px; padding: 20px; background: #222; height: 100vh; overflow-y: auto; }
        #preview { flex-grow: 1; border: 5px solid #444; margin: 20px; }
        .control-group { margin-bottom: 20px; padding: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>RPG Builder</h2>
        <div class="control-group">
            <label>Game Title</label>
            <input type="text" id="gameTitle" value="My RPG">
        </div>
        <div class="control-group">
            <label>Perspective</label>
            <select id="viewType">
                <option value="topdown">Top-Down (Pokemon Style)</option>
                <option value="side">Side View (2.5D Layered)</option>
            </select>
        </div>
        <div class="control-group">
            <button onclick="exportGame()">Build & Export (.zip)</button>
        </div>
    </div>
    <div id="preview">
        <!-- Live Editor Preview Canvas would go here -->
    </div>

    <script>
        async function exportGame() {
            const zip = new JSZip();
            const config = {
                title: document.getElementById('gameTitle').value,
                view: document.getElementById('viewType').value
            };

            // Inject config into our engine template
            const engineCode = `const config = ${JSON.stringify(config)}; 
            // ... engine runtime logic ...`;

            zip.file("index.html", "<html><body><div id='game'></div><script src='engine.js'><\/script><\/body></html>");
            zip.file("engine.js", engineCode);
            
            const content = await zip.generateAsync({type:"blob"});
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = "my-rpg.zip";
            a.click();
        }
    </script>
</body>
</html>
