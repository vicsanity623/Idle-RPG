name: 🧠 Evolve Brain (Continuous)

on:
  schedule:
    # Runs every 80 minutes (approx 1.3 hours) to ensure it stays alive 
    # if the manual trigger fails.
    - cron: '*/80 * * * *'
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write             # To push brain files
  actions: write              # To trigger the "reboot"

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 80       # Safety cap slightly longer than the training run

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy --quiet

      - name: Run headless evolution (1 hour)
        # We run for exactly 60 minutes as requested
        run: python train_headless.py --minutes 60

      - name: Commit and Push updated brain
        id: commit_step
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evolved_core_brain.pkl brain.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            GEN=$(python -c "import json; d=json.load(open('brain.json')); print(d['meta']['generation'])")
            SCORE=$(python -c "import json; d=json.load(open('brain.json')); print(d['meta']['score'])")
            git commit -m "🧠 gen=${GEN} score=${SCORE} [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Reboot Action (Chain Trigger)
        # This triggers a new run immediately after this one finishes.
        # This creates the "constant updating" loop you asked for.
        if: always()
        run: |
          echo "Waiting 12 minutes to hit the 1.2 hour cycle..."
          sleep 720 
          echo "Rebooting..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/evolve.yml/dispatches \
            -d '{"ref":"main"}'
