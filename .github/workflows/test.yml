name: HTML Game Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate-game:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Grab your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Run the check.sh script using 'bash' (No execution permissions needed!)
      - name: Run check.sh
        run: bash check.sh
