name: Game Integrity Check

# Run this workflow every time you push code or make a pull request
on: [push, pull_request]

jobs:
  verify-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run PWA Check Script
        # Using 'bash check.sh' bypasses the need for the file to be +x (executable)
        run: bash check.sh
